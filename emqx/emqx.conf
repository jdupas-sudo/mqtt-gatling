node {
  name = "emqx@127.0.0.1"
  cookie = "sentinelview_secret_cookie"
  data_dir = "/opt/emqx/data"
}

listeners.tcp.default {
  bind = "0.0.0.0:1883"
  acceptors = 16
  max_connections = 100000
}

listeners.ws.default {
  bind = "0.0.0.0:8083"
  max_connections = 10000
}

dashboard {
  listeners.http {
    bind = "0.0.0.0:18083"
  }
  default_username = "admin"
  default_password = "public"
}

authorization {
  no_match = allow
  deny_action = disconnect
}

authentication = []

mqtt {
  max_subscriptions = 100
  max_inflight = 64
  max_packet_size = 1MB
  idle_timeout = 60s
}

log {
  console {
    level = warning
  }
}
